name: auto-release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  version-build-release:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version to')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Read and bump version
        id: version
        run: |
          python - <<'PY'
          import datetime
          import os
          import pathlib
          import re

          package_xml = pathlib.Path("PDFVectorImporter/package.xml")
          readme = pathlib.Path("README.md")
          package_text = package_xml.read_text(encoding="utf-8")

          match = re.search(r"<version>(\d+)\.(\d+)\.(\d+)</version>", package_text)
          if not match:
              raise SystemExit("Could not find <version> in PDFVectorImporter/package.xml")

          major, minor, patch = map(int, match.groups())
          new_version = f"{major}.{minor}.{patch + 1}"
          today = datetime.date.today().isoformat()

          package_text = re.sub(
              r"(<version>)(\d+\.\d+\.\d+)(</version>)",
              rf"\g<1>{new_version}\3",
              package_text,
              count=1,
          )
          package_text = re.sub(
              r"(<date>)(\d{4}-\d{2}-\d{2})(</date>)",
              rf"\g<1>{today}\3",
              package_text,
              count=1,
          )
          package_xml.write_text(package_text, encoding="utf-8")

          for readme in [pathlib.Path("README.md"), pathlib.Path("PDFVectorImporter/README.md")]:
              if not readme.exists():
                  continue
              readme_text = readme.read_text(encoding="utf-8")
              readme_text = re.sub(
                  r"(!\[Version:\s*)(\d+\.\d+\.\d+)(\])",
                  rf"\g<1>{new_version}\3",
                  readme_text,
                  count=1,
              )
              readme_text = re.sub(
                  r"(Version-)(\d+\.\d+\.\d+)(-(green|blue)\.svg)",
                  rf"\g<1>{new_version}\3",
                  readme_text,
                  count=1,
              )
              readme.write_text(readme_text, encoding="utf-8")

          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          out.write_text(f"version={new_version}\n", encoding="utf-8")
          PY

      - name: Build release zip
        run: python build_release.py

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION="v${{ steps.version.outputs.version }}"
          ZIP="PDFVectorImporter_v${{ steps.version.outputs.version }}.zip"

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            echo "Tag ${VERSION} already exists — skipping."
            exit 0
          fi
          git tag "${VERSION}"
          git push origin "${VERSION}"

          gh release create "${VERSION}" \
            --title "${VERSION} — PDF Vector Importer for FreeCAD" \
            --notes "Automated release from latest \`main\` commit.

          **Install:** Download \`${ZIP}\` below, extract into your FreeCAD Mod folder, and restart FreeCAD. Or install via **Tools > Addon Manager**." \
            --latest \
            "${ZIP}"

      - name: Create version bump pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to ${{ steps.version.outputs.version }}"
          branch: "automation/version-bump-v${{ steps.version.outputs.version }}"
          delete-branch: true
          title: "chore: bump version to ${{ steps.version.outputs.version }}"
          body: |
            Automated version bump generated by `auto-release`.

            Updated files:
            - `PDFVectorImporter/package.xml`
            - `README.md`
            - `PDFVectorImporter/README.md`
          add-paths: |
            PDFVectorImporter/package.xml
            README.md
            PDFVectorImporter/README.md
