name: pdf-vector-importer-qa

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
    inputs:
      run_host_integration:
        description: "Run self-hosted CAD integration tests"
        required: false
        default: false
        type: boolean

jobs:
  qa-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Validate workbook schema
        run: |
          python run_pdf_vector_importer_tests.py \
            --workbook PDF_Vector_Importer_Test_Matrix.xlsx \
            --validate-only

      - name: Dry-run AUTO/HYBRID P0 tests
        run: |
          python run_pdf_vector_importer_tests.py \
            --workbook PDF_Vector_Importer_Test_Matrix.xlsx \
            --priority P0 \
            --dry-run \
            --results-csv qa_results.csv \
            --results-json qa_results.json

      - name: Upload QA results
        uses: actions/upload-artifact@v4
        with:
          name: qa-results
          path: |
            qa_results.csv
            qa_results.json

  hosted-integration:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_host_integration == true }}
    runs-on: [self-hosted, windows, pdf-vector-importer]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run SketchUp / FreeCAD AUTO tests
        shell: powershell
        run: |
          python run_pdf_vector_importer_tests.py `
            --workbook PDF_Vector_Importer_Test_Matrix.xlsx `
            --config qa_config.json `
            --automation AUTO `
            --results-csv qa_results.csv `
            --results-json qa_results.json `
            --updated-workbook PDF_Vector_Importer_Test_Matrix_RESULTS.xlsx

      - name: Upload integration artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hosted-integration-results
          path: |
            qa_results.csv
            qa_results.json
            PDF_Vector_Importer_Test_Matrix_RESULTS.xlsx
